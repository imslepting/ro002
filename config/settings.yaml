cameras:
  realsense:
    index: 0
    role: realsense
  cam0:
    index: 4
    role: stereo_left
  cam1:
    index: 2
    role: stereo_right
  cam2:
    index: 1
    role: aux
  cam3:
    index: 3
    role: aux
phase0:
  scan_max_index: 16
  test_frames: 30
  tile_size:
  - 640
  - 480
  sharpness_threshold: 50.0
  brightness_range:
  - 30
  - 230
calibration:
  charuco:
    cols: 9
    rows: 6
    square_size: 0.02871
    marker_size: 0.02169
    aruco_dict: DICT_4X4_50
    origin: center
    custom_origin: null
  acceptance:
    max_rms_intrinsics: 1.0
    max_rms_extrinsics: 1.0
    max_ba_residual: 0.5
    max_pointcloud_error: 0.005
stereo_depth:
  model: Fast-FoundationStereo
  model_dir: external/Fast-FoundationStereo/weights/23-36-37/model_best_bp2_serialize.pth
  max_disparity: 256
  valid_iters: 8
  scale: 1.0
  pad_multiple: 32
  min_depth: 0.05
  max_depth: 10.0
multi_view_recon:
  da3_model: depth-anything/DA3NESTED-GIANT-LARGE
  export_format: ply
phase8_realsense:
  width: 640
  height: 480
  fps: 30
  warmup_frames: 20
  min_depth: 0.15
  max_depth: 5
  cloud_stride: 2
phase7_arm_icp:
  mesh_dir: assets/ra605_710
  init_txyz:
  - 0.5
  - 0.0
  - 0.8
  init_rxyz_deg:
  - -90.0
  - 0.0
  - 90.0
  crop_min: null
  crop_max: null
  voxel_size: 0.01
  points_per_mesh: 8000
  max_correspondence_distance: 0.04
  max_iterations: 80
  point_to_plane: true
  auto_update_settings: true
  preview: false
  result_json: phase7_arm_icp/outputs/arm_icp_result.json
vlm:
  provider: openai
  openai_model: gpt-4o
  claude_model: claude-sonnet-4-20250514
  max_tokens: 4096
  azure_openai:
    enabled: false
    endpoint: null
    deployment: null
    api_version: 2024-12-01-preview
skill_sam3:
  checkpoint: external/sam3/weights/sam3.pt
  score_threshold: 0.3
  max_masks: 5
  overlay_alpha: 0.4
skill_capture_point:
  algorithm: graspgen
  gripper_config: external/GraspGen/models/checkpoints/graspgen_robotiq_2f_140.yml
  num_grasps: 50
  num_candidates: 10
  filter_collisions: false
  gripper_width: 0.136
  pre_grasp_distance: 0.1
  table_height: auto
  approach_direction:
  - 0
  - 1
  - 0
  approach_threshold: 0.7
  workspace_limits:
    x:
    - -1
    - 1
    y:
    - -2
    - 2
    z:
    - -1
    - 1.0
skill_trajectory_planning:
  algorithm: curobo
  robot_config: config/robot_curobo.yml
  collision_from_pointcloud: true
  voxel_size: 0.02
  interpolation_steps: 100
phase7_eye_to_hand:
  camera_name: cam0
  robot_server_url: http://140.118.117.61:5000/get_status
  euler_order: xyz
  min_charuco_corners: 6
  min_samples: 15
  hand_eye_method: tsai
  camera_warmup_sec: 1.0
  target_offset_gripper_m:
  - -0.095807
  - 0.246983
  - -0.619049
arm:
  sdk: xarm
  ip: 192.168.1.xxx
  base_frame: world
  T_cam2arm:
  - - 6.123233995736766e-17
    - 6.123233995736766e-17
    - -1.0
    - 0.8
  - - -1.0
    - 3.749399456654644e-33
    - -6.123233995736766e-17
    - 0.5
  - - 0.0
    - 1.0
    - 6.123233995736766e-17
    - -4.898587196589413e-17
  - - 0.0
    - 0.0
    - 0.0
    - 1.0
